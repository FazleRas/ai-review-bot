name: "AI Review Bot"
description: "Reviews pull request diffs with an LLM and posts inline comments"
branding:
  icon: eye
  color: blue

inputs:
  gemini_api_key:
    description: "Gemini API key (store as a repo secret)"
    required: true
  github_token:
    description: "Token with pull-requests: write"
    required: false
    default: ${{ github.token }}
  config_path:
    description: "Path to reviewbot.yml in the target repo"
    required: false
    default: ".github/reviewbot.yml"

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5
    - name: Run review
      shell: bash
      run: uv run --project "${{ github.action_path }}" python -m reviewbot
      env:
        GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        REVIEWBOT_CONFIG: ${{ inputs.config_path }}
